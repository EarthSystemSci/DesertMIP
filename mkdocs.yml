site_name: DesertMIP
site_description: Desertification Model Intercomparison Project
site_author: DesertMIP Steering Committee
site_url: https://earthsystemsci.github.io/DesertMIP/
repo_url: https://github.com/EarthSystemSci/DesertMIP
repo_name: EarthSystemSci/DesertMIP

use_directory_urls: true

# Theme configuration
theme:
  name: material

# Plugins
plugins:
  - search

# Custom CSS and JavaScript
extra_css:
  - assets/custom.css

extra_javascript:
  - assets/custom.js

# Navigation is auto-generated from folder structure

# Versioning
extra:
  version:
    provider: mike
    default: latest

# Markdown extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

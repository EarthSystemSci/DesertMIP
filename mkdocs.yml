site_name: DesertMIP
site_description: Desertification Model Intercomparison Project
site_author: EarthSystemSci
site_url: https://EarthSystemSci.github.io/DesertMIP/
repo_url: https://github.com/EarthSystemSci/DesertMIP
repo_name: EarthSystemSci/DesertMIP

use_directory_urls: true

# Theme configuration
theme:
  name: shadcn

# Plugins
plugins:
  - search


# Custom CSS and JavaScript
extra_css:
  - assets/custom.css

extra_javascript:
  - assets/custom.js

# Navigation is auto-generated from folder structure

# Markdown extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

# Versioning
extra:
  version:
    provider: mike
    default: latest
